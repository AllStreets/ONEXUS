name: Nightly catalog rebuild

on:
  schedule:
    # Every night at 06:00 UTC — pulls latest agents from ONEXUS-Agents
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/onexus

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out ONEXUS
        uses: actions/checkout@v4

      - name: Read latest catalog ref
        id: catalog_ref
        run: |
          # Use the head SHA of the catalog repo as the build arg so the
          # image is reproducible and points at a known catalog snapshot.
          REF=$(git ls-remote https://github.com/AllStreets/ONEXUS-Agents.git refs/heads/main | awk '{print $1}')
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            CATALOG_REF=${{ steps.catalog_ref.outputs.ref }}
          tags: |
            ${{ env.IMAGE_NAME }}:nightly
            ${{ env.IMAGE_NAME }}:catalog-${{ steps.catalog_ref.outputs.ref }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
