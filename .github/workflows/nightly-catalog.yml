name: Nightly catalog rebuild

on:
  schedule:
    # Every night at 06:00 UTC. The upstream ONEXUS-Agents nightly refresh
    # (cron 13:00 UTC, observed fire 13:30-18:30 + up to 2h run) is always
    # finished well before this slot, so the image bakes the freshest
    # catalog snapshot without racing the refresh.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Kill switch: set the repo Actions variable AGENTS_SYNC_ENABLED to
    # 'false' to stop nightly catalog rebuilds. Unset or any other value
    # means enabled. Documented in docs/AUTOMATION.md.
    if: ${{ vars.AGENTS_SYNC_ENABLED != 'false' }}
    steps:
      - name: Check out ONEXUS
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute lowercase image name
        id: image
        # ghcr.io rejects mixed-case repository names; github.repository is
        # "AllStreets/ONEXUS", so lowercase it here.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/onexus" >> "$GITHUB_OUTPUT"

      - name: Read latest catalog ref
        id: catalog_ref
        run: |
          # Use the head SHA of the catalog repo as the build arg so the
          # image is reproducible and points at a known catalog snapshot.
          REF=$(git ls-remote https://github.com/AllStreets/ONEXUS-Agents.git refs/heads/main | awk '{print $1}')
          if [ -z "$REF" ]; then
            echo "Could not resolve ONEXUS-Agents main HEAD" >&2
            exit 1
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            CATALOG_REF=${{ steps.catalog_ref.outputs.ref }}
          tags: |
            ${{ steps.image.outputs.name }}:nightly
            ${{ steps.image.outputs.name }}:catalog-${{ steps.catalog_ref.outputs.ref }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create bot-failure --repo "$GITHUB_REPOSITORY" \
            --description "Automated pipeline failure" --color B60205 2>/dev/null || true
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label bot-failure \
            --state open --search "in:title Nightly catalog rebuild" \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" \
              --body "Another failed run: $run_url"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Nightly catalog rebuild failed" \
              --label bot-failure \
              --body "The nightly catalog image rebuild failed. Latest run: $run_url. The deployed image keeps serving the previous catalog snapshot until this is fixed. Kill switch: set Actions variable AGENTS_SYNC_ENABLED=false."
          fi
