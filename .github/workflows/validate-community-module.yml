name: Validate Community Module

on:
  pull_request:
    paths:
      - 'community/modules/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install NEXUS
        run: pip install -e .

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Find changed module directories
        id: find-modules
        run: |
          MODULES=$(git diff --name-only origin/main...HEAD | grep '^community/modules/' | cut -d'/' -f1-4 | sort -u)
          echo "modules=$MODULES" >> $GITHUB_OUTPUT

      - name: Validate modules
        run: |
          python -c "
          from pathlib import Path
          from nexus.community.validator import ModuleValidator

          validator = ModuleValidator()
          modules = '''${{ steps.find-modules.outputs.modules }}'''.strip().split('\n')

          failed = False
          for mod_path in modules:
              if not mod_path.strip():
                  continue
              p = Path(mod_path.strip())
              if not p.exists():
                  continue
              print(f'Validating {p}...')
              result = validator.validate(p)
              if result.valid:
                  print(f'  PASS')
              else:
                  print(f'  FAIL:')
                  for err in result.errors:
                      print(f'    - {err}')
                  failed = True

          if failed:
              exit(1)
          "

      - name: Run module tests
        run: |
          MODULES=$(git diff --name-only origin/main...HEAD | grep '^community/modules/' | cut -d'/' -f1-4 | sort -u)
          for mod in $MODULES; do
            if [ -d "$mod/tests" ]; then
              echo "Testing $mod..."
              pytest "$mod/tests/" -v
            fi
          done
