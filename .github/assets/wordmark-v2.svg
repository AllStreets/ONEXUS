    <g transform="translate(538.70 220.00) scale(0.072266 -0.072266)"><path d="M149 1466H1363V1153H603V920H1308V621H603V332H1385V0H149Z"/></g>
    <g transform="translate(642.58 220.00) scale(0.072266 -0.072266)"><path d="M49 1466H548L808 1015L1060 1466H1554L1098 756L1597 0H1088L799 471L509 0H3L509 764Z"/></g>
    <g transform="translate(754.70 220.00) scale(0.072266 -0.072266)"><path d="M1104 1466H1556V592Q1556 462 1515.5 346.5Q1475 231 1388.5 144.5Q1302 58 1207 23Q1075 -26 890 -26Q783 -26 656.5 -11.0Q530 4 445.0 48.5Q360 93 289.5 175.0Q219 257 193 344Q151 484 151 592V1466H603V571Q603 451 669.5 383.5Q736 316 854 316Q971 316 1037.5 382.5Q1104 449 1104 571Z"/></g>
    <g transform="translate(874.99 220.00) scale(0.072266 -0.072266)"><path d="M71 485 502 512Q516 407 559 352Q629 263 759 263Q856 263 908.5 308.5Q961 354 961 414Q961 471 911 516Q861 561 679 601Q381 668 254 779Q126 890 126 1062Q126 1175 191.5 1275.5Q257 1376 388.5 1433.5Q520 1491 749 1491Q1030 1491 1177.5 1386.5Q1325 1282 1353 1054L926 1029Q909 1128 854.5 1173.0Q800 1218 704 1218Q625 1218 585.0 1184.5Q545 1151 545 1103Q545 1068 578 1040Q610 1011 730 986Q1027 922 1155.5 856.5Q1284 791 1342.5 694.0Q1401 597 1401 477Q1401 336 1323.0 217.0Q1245 98 1105.0 36.5Q965 -25 752 -25Q378 -25 234.0 119.0Q90 263 71 485Z"/></g>
  </g>

  <!-- Main face -->
  <g fill="url(#word)" filter="url(#word-glow)">
    <g transform="translate(298.13 220.00) scale(0.072266 -0.072266)"><path d="M93 732Q93 1091 293.0 1291.0Q493 1491 850 1491Q1216 1491 1414.0 1294.5Q1612 1098 1612 744Q1612 487 1525.5 322.5Q1439 158 1275.5 66.5Q1112 -25 868 -25Q620 -25 457.5 54.0Q295 133 194.0 304.0Q93 475 93 732ZM546 730Q546 508 628.5 411.0Q711 314 853 314Q999 314 1079.0 409.0Q1159 504 1159 750Q1159 957 1075.5 1052.5Q992 1148 849 1148Q712 1148 629.0 1051.0Q546 954 546 730Z"/></g>
    <g transform="translate(418.42 220.00) scale(0.072266 -0.072266)"><path d="M153 1466H576L1128 655V1466H1555V0H1128L579 805V0H153Z"/></g>
    <g transform="translate(538.70 220.00) scale(0.072266 -0.072266)"><path d="M149 1466H1363V1153H603V920H1308V621H603V332H1385V0H149Z"/></g>
    <g transform="translate(642.58 220.00) scale(0.072266 -0.072266)"><path d="M49 1466H548L808 1015L1060 1466H1554L1098 756L1597 0H1088L799 471L509 0H3L509 764Z"/></g>
    <g transform="translate(754.70 220.00) scale(0.072266 -0.072266)"><path d="M1104 1466H1556V592Q1556 462 1515.5 346.5Q1475 231 1388.5 144.5Q1302 58 1207 23Q1075 -26 890 -26Q783 -26 656.5 -11.0Q530 4 445.0 48.5Q360 93 289.5 175.0Q219 257 193 344Q151 484 151 592V1466H603V571Q603 451 669.5 383.5Q736 316 854 316Q971 316 1037.5 382.5Q1104 449 1104 571Z"/></g>
    <g transform="translate(874.99 220.00) scale(0.072266 -0.072266)"><path d="M71 485 502 512Q516 407 559 352Q629 263 759 263Q856 263 908.5 308.5Q961 354 961 414Q961 471 911 516Q861 561 679 601Q381 668 254 779Q126 890 126 1062Q126 1175 191.5 1275.5Q257 1376 388.5 1433.5Q520 1491 749 1491Q1030 1491 1177.5 1386.5Q1325 1282 1353 1054L926 1029Q909 1128 854.5 1173.0Q800 1218 704 1218Q625 1218 585.0 1184.5Q545 1151 545 1103Q545 1068 578 1040Q610 1011 730 986Q1027 922 1155.5 856.5Q1284 791 1342.5 694.0Q1401 597 1401 477Q1401 336 1323.0 217.0Q1245 98 1105.0 36.5Q965 -25 752 -25Q378 -25 234.0 119.0Q90 263 71 485Z"/></g>
  </g>

  <!-- Top-edge specular highlight -->
  <g fill="url(#top-hi)" style="mix-blend-mode:screen" opacity="0.85">
    <g transform="translate(298.13 220.00) scale(0.072266 -0.072266)"><path d="M93 732Q93 1091 293.0 1291.0Q493 1491 850 1491Q1216 1491 1414.0 1294.5Q1612 1098 1612 744Q1612 487 1525.5 322.5Q1439 158 1275.5 66.5Q1112 -25 868 -25Q620 -25 457.5 54.0Q295 133 194.0 304.0Q93 475 93 732ZM546 730Q546 508 628.5 411.0Q711 314 853 314Q999 314 1079.0 409.0Q1159 504 1159 750Q1159 957 1075.5 1052.5Q992 1148 849 1148Q712 1148 629.0 1051.0Q546 954 546 730Z"/></g>
    <g transform="translate(418.42 220.00) scale(0.072266 -0.072266)"><path d="M153 1466H576L1128 655V1466H1555V0H1128L579 805V0H153Z"/></g>
    <g transform="translate(538.70 220.00) scale(0.072266 -0.072266)"><path d="M149 1466H1363V1153H603V920H1308V621H603V332H1385V0H149Z"/></g>
    <g transform="translate(642.58 220.00) scale(0.072266 -0.072266)"><path d="M49 1466H548L808 1015L1060 1466H1554L1098 756L1597 0H1088L799 471L509 0H3L509 764Z"/></g>
    <g transform="translate(754.70 220.00) scale(0.072266 -0.072266)"><path d="M1104 1466H1556V592Q1556 462 1515.5 346.5Q1475 231 1388.5 144.5Q1302 58 1207 23Q1075 -26 890 -26Q783 -26 656.5 -11.0Q530 4 445.0 48.5Q360 93 289.5 175.0Q219 257 193 344Q151 484 151 592V1466H603V571Q603 451 669.5 383.5Q736 316 854 316Q971 316 1037.5 382.5Q1104 449 1104 571Z"/></g>
    <g transform="translate(874.99 220.00) scale(0.072266 -0.072266)"><path d="M71 485 502 512Q516 407 559 352Q629 263 759 263Q856 263 908.5 308.5Q961 354 961 414Q961 471 911 516Q861 561 679 601Q381 668 254 779Q126 890 126 1062Q126 1175 191.5 1275.5Q257 1376 388.5 1433.5Q520 1491 749 1491Q1030 1491 1177.5 1386.5Q1325 1282 1353 1054L926 1029Q909 1128 854.5 1173.0Q800 1218 704 1218Q625 1218 585.0 1184.5Q545 1151 545 1103Q545 1068 578 1040Q610 1011 730 986Q1027 922 1155.5 856.5Q1284 791 1342.5 694.0Q1401 597 1401 477Q1401 336 1323.0 217.0Q1245 98 1105.0 36.5Q965 -25 752 -25Q378 -25 234.0 119.0Q90 263 71 485Z"/></g>
  </g>

  <!-- ── horizontal kernel signal line beneath the wordmark ──────────────── -->
  <g>
    <line x1="380" y1="262" x2="900" y2="262"
          stroke="rgba(180,139,255,0.30)" stroke-width="1"/>
    <rect x="378" y="259" width="4" height="6" fill="#b48bff"/>
    <rect x="898" y="259" width="4" height="6" fill="#b48bff"/>
    <rect x="0" y="259" width="3" height="6" fill="#e7d9ff" opacity="0.85">
      <animate attributeName="x" values="380;896;380" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ── tagline ──────────────────────────────────────────────────────────── -->
  <text x="640" y="294" text-anchor="middle"
        font-family="ui-monospace,'JetBrains Mono','SF Mono',Menlo,monospace"
        font-size="13" letter-spacing="0.42em" fill="#c9b8ff"
        font-weight="500">AN OPERATING SYSTEM FOR AGENTS</text>

  <!-- ── version chip (bottom-right) ──────────────────────────────────────── -->
  <g transform="translate(1188 314)"
     font-family="ui-monospace,'JetBrains Mono','SF Mono',Menlo,monospace"
     font-size="9" letter-spacing="0.18em">
    <rect x="-46" y="-12" width="92" height="20" rx="3"
          fill="rgba(180,139,255,0.10)" stroke="rgba(180,139,255,0.32)"/>
    <text x="0" y="2" text-anchor="middle" fill="#c9b8ff">V1.0.0 · STATIC</text>
  </g>

  <!-- ── label chip (bottom-left) ─────────────────────────────────────────── -->
  <g transform="translate(92 314)"
     font-family="ui-monospace,'JetBrains Mono','SF Mono',Menlo,monospace"
     font-size="9" letter-spacing="0.18em">
    <rect x="-46" y="-12" width="92" height="20" rx="3"
          fill="rgba(154,255,182,0.06)" stroke="rgba(154,255,182,0.22)"/>
    <text x="0" y="2" text-anchor="middle" fill="#9affb6">SOVEREIGN · LOCAL</text>
  </g>
</svg>
