<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img"
     aria-label="ONEXUS — the operating system for agents"
     preserveAspectRatio="xMidYMid meet">
  <title>ONEXUS — the operating system for agents</title>

  <defs>
    <!-- Canvas vignette — near-black centre fading to deeper ink at the edges -->
    <radialGradient id="canvas" cx="50%" cy="50%" r="75%">
      <stop offset="0%"  stop-color="#0c0820"/>
      <stop offset="55%" stop-color="#070418"/>
      <stop offset="100%" stop-color="#03020a"/>
    </radialGradient>

    <!-- Wordmark gradient: cool violet → bright lavender → warm rose-lavender -->
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8a76e0"/>
      <stop offset="30%"  stop-color="#cbb6ff"/>
      <stop offset="55%"  stop-color="#e7d9ff"/>
      <stop offset="80%"  stop-color="#d2bfff"/>
      <stop offset="100%" stop-color="#9a7fff"/>
    </linearGradient>

    <!-- Top-edge highlight (a thin bright sliver above the letterforms) -->
    <linearGradient id="top-hi" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.65)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Halo behind the wordmark — soft violet bloom -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(180,139,255,0.45)"/>
      <stop offset="55%"  stop-color="rgba(122, 95,212,0.13)"/>
      <stop offset="100%" stop-color="rgba(122, 95,212,0)"/>
    </radialGradient>

    <filter id="halo-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <filter id="word-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Status pulse dot — heartbeat -->
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9affb6" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#5cd4c0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5cd4c0" stop-opacity="0"/>
    </radialGradient>

    <!-- Background dot grid pattern — subtle technical texture -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(180,139,255,0.07)"/>
    </pattern>
  </defs>

  <!-- ── canvas ────────────────────────────────────────────────────────────── -->
  <rect width="1280" height="360" fill="url(#canvas)"/>
  <rect width="1280" height="360" fill="url(#dots)"/>

  <!-- ── violet halo behind the wordmark ──────────────────────────────────── -->
  <ellipse cx="640" cy="200" rx="520" ry="120"
           fill="url(#halo)" filter="url(#halo-blur)"/>

  <!-- ── corner HUD brackets ──────────────────────────────────────────────── -->
  <g stroke="rgba(180,139,255,0.45)" stroke-width="1" fill="none" stroke-linecap="square">
    <path d="M28 28 L28 60 M28 28 L60 28"/>
    <path d="M1252 28 L1252 60 M1252 28 L1220 28"/>
    <path d="M28 332 L28 300 M28 332 L60 332"/>
    <path d="M1252 332 L1252 300 M1252 332 L1220 332"/>
  </g>

  <!-- ── status row (top centre) ──────────────────────────────────────────── -->
  <g font-family="ui-monospace,'JetBrains Mono','SF Mono',Menlo,monospace"
     font-size="10" letter-spacing="0.32em">
    <circle cx="480" cy="65" r="3" fill="#9affb6"/>
    <circle cx="480" cy="65" r="7" fill="url(#pulse)">
      <animate attributeName="r"       values="5;9;5"       dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="500" y="69" text-anchor="start" fill="#9affb6">KERNEL ONLINE</text>
    <text x="640" y="69" text-anchor="middle" fill="#6b6080">·</text>
    <text x="700" y="69" text-anchor="start" fill="#a8a0c8">NETWORK.IO  ∅</text>
    <text x="852" y="69" text-anchor="middle" fill="#6b6080">·</text>
    <text x="912" y="69" text-anchor="start" fill="#c9b8ff">6,745 AGENTS</text>
  </g>

  <!-- ── wordmark "ONEXUS" — converted to paths (Arial Black) so it renders
       identically on every viewer, regardless of installed fonts ──────────── -->

  <!-- Drop shadow (very subtle) -->
  <g fill="rgba(0,0,0,0.55)" transform="translate(0 4)" filter="url(#word-glow)">
    <g transform="translate(298.13 220.00) scale(0.072266 -0.072266)"><path d="M93 732Q93 1091 293.0 1291.0Q493 1491 850 1491Q1216 1491 1414.0 1294.5Q1612 1098 1612 744Q1612 487 1525.5 322.5Q1439 158 1275.5 66.5Q1112 -25 868 -25Q620 -25 457.5 54.0Q295 133 194.0 304.0Q93 475 93 732ZM546 730Q546 508 628.5 411.0Q711 314 853 314Q999 314 1079.0 409.0Q1159 504 1159 750Q1159 957 1075.5 1052.5Q992 1148 849 1148Q712 1148 629.0 1051.0Q546 954 546 730Z"/></g>
