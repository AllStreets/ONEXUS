<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS Dashboard</title>
  <link rel="stylesheet" href="/dashboard/styles.css">
  <style>
    /* Critical inline: prevent flash of unstyled content */
    html { background: #06060c; }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">
        <span id="header-icon"></span>
        <span>ONEXUS</span>
      </div>
      <span class="header-label">DASHBOARD</span>
    </div>
    <div class="header-right" id="status-bar">
      <div class="status-pill unknown"><span class="dot"></span>loading</div>
    </div>
  </header>

  <!-- Main Three-Column Panels -->
  <div class="main-panels">

    <!-- Module List (left) -->
    <div class="panel" id="module-list">
      <div class="panel-header">
        <div class="panel-title">
          <span class="icon-wrap" id="icon-modules"></span>
          MODULES
        </div>
      </div>
      <div class="module-search">
        <div class="module-search-wrap">
          <span class="search-icon" id="icon-search"></span>
          <input type="text" placeholder="Filter modules..." spellcheck="false" />
        </div>
      </div>
      <div class="module-controls">
        <button data-sort="trust" class="active">by trust</button>
        <button data-sort="alpha">A-Z</button>
        <span class="divider"></span>
        <button data-category="kernel">kernel</button>
        <button data-category="intelligence">intel</button>
        <button data-category="agent">agent</button>
      </div>
      <div class="panel-body"></div>
    </div>

    <!-- Trust Gauges (center) -->
    <div class="panel" id="trust-gauges">
      <div class="panel-header">
        <div class="panel-title">
          <span class="icon-wrap" id="icon-trust"></span>
          TRUST GAUGES
        </div>
      </div>
      <div class="panel-body"></div>
    </div>

    <!-- Pulse Event Stream (right) -->
    <div class="panel" id="pulse-stream">
      <div class="panel-header">
        <div class="panel-title">
          <span class="icon-wrap" id="icon-pulse"></span>
          PULSE STREAM
        </div>
        <div class="pulse-connection disconnected">
          <span class="dot"></span>offline
        </div>
      </div>
      <div class="panel-body"></div>
    </div>

  </div>

  <!-- Chronicle Timeline -->
  <div class="chronicle-panel" id="chronicle">
    <div class="panel-header">
      <div class="panel-title">
        <span class="icon-wrap" id="icon-chronicle"></span>
        CHRONICLE
      </div>
      <div class="chronicle-filters">
        <button data-filter="all" class="active">all</button>
        <button data-filter="start">start</button>
        <button data-filter="stop">stop</button>
        <button data-filter="trust">trust</button>
        <button data-filter="allow">allow</button>
        <button data-filter="deny">deny</button>
        <button data-filter="msg">msg</button>
      </div>
    </div>
    <div class="timeline-wrap">
      <div class="timeline-track">
        <div class="timeline-line"></div>
      </div>
    </div>
  </div>

  <!-- Database Modal -->
  <div class="modal-overlay" id="db-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">
          <span class="icon-wrap" id="icon-db-modal"></span>
          DATABASE
        </div>
        <button class="modal-close" id="db-modal-close"></button>
      </div>
      <div class="modal-body">
        <div id="db-info"></div>
      </div>
    </div>
  </div>

  <!-- Provider Modal -->
  <div class="modal-overlay" id="provider-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">
          <span class="icon-wrap" id="icon-llm"></span>
          LLM PROVIDERS
        </div>
        <button class="modal-close" id="provider-modal-close"></button>
      </div>
      <div class="modal-body">
        <!-- Registered providers list -->
        <div class="provider-list" id="provider-list"></div>
        <!-- Registration form -->
        <div class="provider-form">
          <div class="provider-form-title">Connect Provider</div>
          <div class="provider-type-selector">
            <button class="provider-type-btn active" data-type="anthropic">Anthropic</button>
            <button class="provider-type-btn" data-type="openai">OpenAI</button>
            <button class="provider-type-btn" data-type="local">Local</button>
          </div>
          <div class="provider-fields">
            <div class="field-group" id="field-api-key">
              <label>API Key</label>
              <div class="field-input-wrap">
                <span class="field-icon" id="icon-key-field"></span>
                <input type="password" id="provider-api-key" placeholder="sk-..." spellcheck="false" autocomplete="off" />
              </div>
            </div>
            <div class="field-group" id="field-model">
              <label>Model <span class="field-optional">optional</span></label>
              <input type="text" id="provider-model" placeholder="claude-sonnet-4-20250514" spellcheck="false" autocomplete="off" />
            </div>
            <div class="field-group" id="field-base-url" style="display:none">
              <label>Base URL <span class="field-optional">optional</span></label>
              <input type="text" id="provider-base-url" placeholder="http://localhost:8384" spellcheck="false" autocomplete="off" />
            </div>
            <div class="field-row">
              <label class="field-checkbox">
                <input type="checkbox" id="provider-set-default" checked />
                <span>Set as default provider</span>
              </label>
            </div>
          </div>
          <button class="provider-submit-btn" id="provider-submit">
            Connect Provider
          </button>
          <div class="provider-status" id="provider-status"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Message Console -->
  <div class="console-panel" id="console">
    <div class="panel-header">
      <div class="panel-title">
        <span class="icon-wrap" id="icon-terminal"></span>
        CONSOLE
      </div>
    </div>
    <div class="console-output"></div>
    <div class="console-input-row">
      <span class="console-prompt">&gt;</span>
      <input type="text" placeholder="Send a message through Cortex..." spellcheck="false" autocomplete="off" />
      <button class="console-send-btn" id="console-send-icon">
        <!-- send icon injected by JS -->
      </button>
    </div>
  </div>

</div>

<script src="/dashboard/icons.js"></script>
<script src="/dashboard/app.js"></script>
<script>
  // Inject icons into header slots
  document.getElementById('header-icon').innerHTML = icon('nexus', 22);
  document.getElementById('icon-modules').innerHTML = icon('module', 14);
  document.getElementById('icon-search').innerHTML = icon('search', 13);
  document.getElementById('icon-trust').innerHTML = icon('trust', 14);
  document.getElementById('icon-pulse').innerHTML = icon('pulse', 14);
  document.getElementById('icon-chronicle').innerHTML = icon('chronicle', 14);
  document.getElementById('icon-terminal').innerHTML = icon('terminal', 14);
  document.getElementById('console-send-icon').innerHTML = icon('send', 15);
  document.getElementById('icon-db-modal').innerHTML = icon('database', 16);
  document.getElementById('db-modal-close').innerHTML = icon('x', 18);
  document.getElementById('icon-llm').innerHTML = icon('llm', 16);
  document.getElementById('provider-modal-close').innerHTML = icon('x', 18);
  document.getElementById('icon-key-field').innerHTML = icon('key', 14);
</script>

</body>
</html>
