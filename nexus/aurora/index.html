<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONEXUS</title>
  <link rel="stylesheet" href="/aurora/static/tokens.css">
  <link rel="stylesheet" href="/aurora/static/mood.css">
  <link rel="stylesheet" href="/aurora/static/app.css">
</head>
<body class="nx-mood nx-mood-calm-focus" data-mood="calm_focus">
  <!-- Ambient atmosphere — the mood-driven mesh that fills the whole viewport -->
  <div class="nx-ambient" aria-hidden="true"></div>

  <!-- Shell — a CSS Grid: row 1 = chrome, row 2 = body -->
  <div class="nx-shell" id="nx-shell">

    <!-- ── chrome bar ───────────────────────────────────────────────── -->
    <!-- The browser already owns window controls. When ONEXUS is wrapped
         in a Tauri/Electron standalone shell, the host window will provide
         its own native traffic lights. Don't duplicate them here. -->
    <header class="nx-chrome">
      <div class="nx-chrome-left">
        <button class="nx-chrome-icon nx-icon-focus" id="nx-tl-focus" title="Focus mode — hide sidebar &amp; cockpit (esc to exit)" aria-label="Toggle focus mode">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 5V2h3M9 2h3v3M2 9v3h3M9 12h3v-3"/>
          </svg>
        </button>
        <button class="nx-chrome-icon" id="nx-tl-fullscreen" title="Toggle browser fullscreen" aria-label="Toggle fullscreen">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 5V2h3M9 2h3v3M2 9v3h3M9 12h3v-3"/>
            <path d="M6 6l-3-3M11 11l-3-3M6 8l-3 3M11 3L8 6"/>
          </svg>
        </button>
      </div>

      <div class="nx-chrome-center">
        <button class="nx-chrome-home" id="nx-chrome-home" title="Return to workspace home">
          <span class="nx-chrome-mark" id="nx-kernel-mark"></span>
          <span class="nx-chrome-brand">ONEXUS</span>
        </button>
        <span class="nx-chrome-sep">/</span>
        <button class="nx-chrome-context" id="nx-chrome-context">no workspace</button>
      </div>

      <div class="nx-chrome-right">
        <button class="nx-chrome-icon" id="nx-open-tour" title="Replay the welcome walkthrough" aria-label="Replay walkthrough">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 1.4 L7.9 5.1 L11.6 6 L7.9 6.9 L7 10.6 L6.1 6.9 L2.4 6 L6.1 5.1 Z"/>
            <circle cx="11.2" cy="11" r="0.8"/>
          </svg>
        </button>
        <button class="nx-chrome-icon" id="nx-open-guide" title="Open the guide (?)" aria-label="Open guide">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="7" cy="7" r="5.4"/>
            <path d="M5.4 5.4a1.6 1.6 0 1 1 2.4 1.4c-.6.3-.8.7-.8 1.2"/>
            <circle cx="7" cy="10.2" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <button class="nx-chrome-icon" id="nx-cockpit-toggle" title="Show/hide cockpit rail" aria-label="Toggle cockpit rail">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="1.5" y="2.5" width="11" height="9" rx="1.4"/>
            <path d="M9 2.5v9"/>
          </svg>
        </button>
        <button class="nx-mood-pill" id="nx-mood-pill" title="Ambient mood (⌘0 for expanded cockpit)">
          <span class="nx-mood-dot"></span>
          <span class="nx-mood-label" id="nx-mood-label">calm focus</span>
        </button>
        <span class="nx-chrome-clock" id="nx-clock">--:--</span>
      </div>
    </header>

    <!-- ── body grid: sidebar / main / cockpit ─────────────────────── -->
    <div class="nx-body" id="nx-body">

      <!-- ── sidebar ─────────────────────────────────────────────── -->
      <aside class="nx-region nx-sidebar" id="nx-sidebar">
        <div class="nx-region-inner nx-sidebar-inner">
          <!-- search -->
          <div class="nx-search">
            <span class="nx-search-icon" aria-hidden="true"></span>
            <input class="nx-search-input" id="nx-search-input"
                   placeholder="search · ⌘K"
                   aria-label="Search workspaces and agents">
          </div>

          <!-- workspaces -->
          <div class="nx-section">
            <div class="nx-section-label">WORKSPACES</div>
            <div class="nx-ws-list" id="nx-ws-list"></div>
            <button class="nx-new-ws" id="nx-new-ws" title="New workspace (⌘N)">
              <span class="nx-new-ws-plus" aria-hidden="true"></span>
              <span class="nx-new-ws-label">new workspace</span>
              <span class="nx-new-ws-kbd">⌘N</span>
            </button>
          </div>

          <!-- recent agents -->
          <div class="nx-section">
            <div class="nx-section-label">RECENT AGENTS</div>
            <div class="nx-agent-list" id="nx-recent-agents"></div>
          </div>

          <!-- nav links -->
          <div class="nx-section nx-section-tail">
            <button class="nx-side-link" id="nx-open-workshop">
              <span class="nx-side-link-icon"></span>
              <span>workshop</span>
              <span class="nx-side-link-kbd">⌘E</span>
            </button>
            <button class="nx-side-link" id="nx-open-search">
              <span class="nx-side-link-icon search"></span>
              <span>web search</span>
              <span class="nx-side-link-kbd">⌘/</span>
            </button>
            <button class="nx-side-link" id="nx-open-catalog">
              <span class="nx-side-link-icon catalog"></span>
              <span>agent catalog</span>
              <span class="nx-side-link-arrow">↗</span>
            </button>
            <button class="nx-side-link" id="nx-open-settings">
              <span class="nx-side-link-icon settings"></span>
              <span>settings</span>
              <span class="nx-side-link-kbd">⌘P</span>
            </button>
          </div>
        </div>

        <!-- user footer — sibling of inner so it stays pinned -->
        <div class="nx-user-footer" id="nx-user-footer">
          <div class="nx-user-avatar"><span id="nx-user-initials">CE</span></div>
          <div class="nx-user-meta">
            <div class="nx-user-name" id="nx-user-name">you</div>
            <div class="nx-user-sub">sovereign · local</div>
          </div>
        </div>
      </aside>

      <!-- ── main canvas — rendered by JS per route ─────────────── -->
      <main class="nx-region nx-main" id="nx-main"></main>

      <!-- ── cockpit rail ────────────────────────────────────────── -->
      <aside class="nx-region nx-cockpit-rail" id="nx-cockpit-rail">
        <div class="nx-region-inner nx-cockpit-inner">
          <div class="nx-cp-section">
            <div class="nx-section-label">TRUST · LAST 60M</div>
            <div class="nx-trust-card" id="nx-trust-card"></div>
          </div>

          <div class="nx-cp-section">
            <div class="nx-section-label">RECENT PERMISSIONS</div>
            <div class="nx-perm-log" id="nx-perm-log"></div>
          </div>

          <div class="nx-cp-section">
            <div class="nx-section-label">AMBIENT MOOD</div>
            <div class="nx-mood-card" id="nx-mood-card"></div>
            <div class="nx-mood-reasons nx-mono" id="nx-mood-reasons"></div>
          </div>

          <div class="nx-cp-section">
            <div class="nx-section-label" id="nx-agents-label">10 BUILT-IN · 7K+ CATALOG</div>
            <div class="nx-agent-discs" id="nx-agent-discs"></div>
          </div>
        </div>

        <!-- footer — sibling of inner so it stays pinned -->
        <div class="nx-cp-foot nx-mono">
          <div>v1.0 · <span id="nx-tests-line">1075 tests passing</span></div>
          <div>kernel.network.io = ∅ <span class="nx-cp-foot-sub">(static-verified)</span></div>
        </div>
      </aside>

    </div><!-- /nx-body -->
  </div><!-- /nx-shell -->

  <!-- Overlay root (switcher, new-ws form, cockpit modal, tour, capability sheet, install review, first-use prompt) -->
  <div id="nx-overlay-root"></div>

  <script type="module" src="/aurora/static/app.js"></script>
</body>
</html>
